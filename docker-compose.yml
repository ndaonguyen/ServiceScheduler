# Local development dependencies. Start with: docker compose up -d
# The API's default connection string (appsettings.json) targets this instance.
services:
  postgres:
    image: postgres:17-alpine
    container_name: appointmentscheduler-postgres
    environment:
      POSTGRES_DB: appointmentscheduler
      POSTGRES_USER: appointmentscheduler
      POSTGRES_PASSWORD: appointmentscheduler
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Schema is created by EF Core migrations (the API auto-migrates in Development;
      # otherwise run `dotnet ef database update`). No init scripts here.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appointmentscheduler -d appointmentscheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
