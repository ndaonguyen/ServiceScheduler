name: Deploy

# Skeleton deploy pipeline: build + push the container image, apply DB migrations, then
# roll out. Migrations run BEFORE the app rolls out (same ordering as content-media-service).
#
# This template is cloud-agnostic, so:
#   - the image goes to GitHub Container Registry (GHCR) using the built-in GITHUB_TOKEN
#     (no extra secrets). Swap for ECR/GAR/ACR by changing the login + image name.
#   - the final "deploy" job is a placeholder — wire in your target (ECS, k8s, App Runner…).
#
# Required: set the env-scoped secret DB_CONNECTION_STRING (an Npgsql connection string,
# consumed by the migrate job's `dotnet ef database update`).
# Also required at RUNTIME (wire into the deploy job): the JWT signing key, supplied to the app as
# the env var Jwt__SigningKey (HS256, >= 32 bytes) — e.g. from an env-scoped JWT_SIGNING_KEY secret.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (selects environment-scoped secrets/vars)'
        required: true
        default: 'staging'
        type: string

concurrency:
  group: deploy-${{ github.event.inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.gitversion.outputs.semVer }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GitVersion needs full history

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v3
        with:
          versionSpec: '6.x'

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v3
        with:
          useConfigFile: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.gitversion.outputs.semVer }}
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate:
    name: Migrate database
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Install .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore tools (dotnet-ef)
        run: dotnet tool restore

      - name: Apply EF Core migrations
        run: >
          dotnet ef database update
          --project source/ServiceScheduler.Infrastructure
          --startup-project source/ServiceScheduler.Api
        env:
          AppDb__ConnectionString: ${{ secrets.DB_CONNECTION_STRING }}

  deploy:
    name: Roll out
    needs: migrate
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    steps:
      - name: Deploy image
        run: |
          echo "Deploying ${IMAGE_NAME}:${VERSION} to ${ENVIRONMENT}"
          echo "TODO: wire your target here — e.g. aws ecs update-service / kubectl set image /"
          echo "      az containerapp update / gcloud run deploy. DB is already migrated."
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          VERSION: ${{ needs.build-and-push.outputs.version }}
          ENVIRONMENT: ${{ github.event.inputs.environment }}
